function preloadFonts() {

  if ('fonts' in document) {

    document.fonts.load('16px "YourCustomFontName"').then(() => {
      console.log('字體已在後台下載完畢');
    });
  }

  // 方法 B（備用兼容方案）：在頁面放入一個透明不可見的元素使用該字體
  const hiddenText = document.createElement('div');
  hiddenText.style.fontFamily = 'YourCustomFontName';
  hiddenText.style.position = 'absolute';
  hiddenText.style.opacity = '0';
  hiddenText.style.pointerEvents = 'none';
  hiddenText.innerText = '預載字體';
  document.body.appendChild(hiddenText);
}

      soundClone.volume = volume;
      soundClone.play().catch(e => console.log('音效播放受限:', e));
    }
  }

  startAmbient() {
    this.ambientWind.play().catch(e => console.log('環境音播放受限:', e));
  }
}

        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {}
            };
            return [storedValue, setValue];
        }

                        onClick={startGame}
                        aria-label="開始遊戲"
                        className="absolute bottom-[50%] left-1/2 -translate-x-1/2 w-[60%] h-[12%] bg-red-500/50 border-none outline-none cursor-pointer clickable-hotspot z-20"
                        style={{ -webkit-tap-highlight-color: 'transparent' }}
                        />
                    </div>
                );
            }

            if (currentPage === 'loading') {
                return (
                    <div className="app-container bg-cover bg-center flex flex-col items-center justify-center relative animate-fade-in" style={{ backgroundImage: "url('./Loading.png')" }}>
                        <div className="absolute top-1/4 flex flex-col items-center z-10">
                            <div className="relative w-28 h-28 flex items-center justify-center mt-20">
                                <div className="absolute inset-0 border-4 border-gray-800 rounded-full border-t-transparent border-l-transparent animate-spin-slow opacity-85" style={{ filter: 'blur(1px)' }}></div>
                                <div className="absolute inset-2.5 border-2 border-gray-600 rounded-full border-b-transparent animate-spin-slow" style={{ animationDirection: 'reverse', animationDuration: '4s' }}></div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (currentPage === 'home') {
                const cardFonts = getCardFontClasses();
                return (
                    <div className="app-container bg-[#0f0e0c] flex flex-col justify-between animate-fade-in" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
                        <div className="absolute inset-0 opacity-15 pointer-events-none" style={{ backgroundImage: "url('./Game.png')", backgroundSize: 'cover', mixBlendMode: 'overlay' }}></div>
                        
                        <header className="flex justify-between items-center py-2 px-5 border-b border-[#2d281f] relative z-10 bg-[#0d0c0a]/90 backdrop-blur-md">
                            <h1 className="text-base text-[#c9a76b] tracking-[0.4em] font-medium py-1">文學遊<span className="text-[10px] text-red-800 ml-1 font-bold">林</span></h1>
                            <div className="text-[10px] text-gray-500 tracking-widest uppercase">{homeTab === 'game' ? '探索篇章' : '典藏閱讀'}</div>
                        </header>

                        <div className="flex-1 overflow-y-auto px-6 py-4 relative z-10 scrollbar-hide">
                            {homeTab === 'game' ? (
                                <>
                                    <div className="mb-4">
                                        <p className="text-[#c9a76b] text-base tracking-widest">探索詩境之美</p>
                                        <p className="text-gray-400 text-[11px] tracking-wider mt-0.5">走進詩人的世界，感受文字背後的意境</p>
                                    </div>
                                    <h3 className="text-xs text-gray-500 mb-3 border-l-2 border-[#c9a76b] pl-2 tracking-widest uppercase">DSE 28篇指定篇章</h3>
                                    <div className="space-y-3.5 mb-10">
                                        {POEMS.map((poem, idx) => {
                                            const isUnlocked = unlockedPoems.includes(poem.id);
                                            const isCompleted = isUnlocked && poem.hotspots.length > 0;
                                            return (
                                                <div key={poem.id} onClick={() => openPoem(poem.id)} className={`relative flex items-center p-2.5 rounded-lg border clickable-hotspot transition-all duration-300 ${isUnlocked ? 'border-[#4a3f2b] bg-[#1a1712]/90 hover:bg-[#231e16] shadow-sm' : 'border-[#1a1714] bg-[#0c0a09] opacity-45'}`}>
                                                    <div className="w-14 h-14 rounded-md bg-gray-900 overflow-hidden mr-3 shrink-0 relative border border-[#3a3224]/50 flex items-center justify-center text-xs text-gray-600 font-bold">
                                                        {isUnlocked ? <img src={poem.bgImage} alt={poem.title} className="w-full h-full object-cover opacity-50" /> : idx + 1}
                                                    </div>
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2">
                                                            <h4 className={`${cardFonts.title} text-[#e0d5ba] tracking-wider font-bold`}>{poem.title}</h4>
                                                            <span className={`${cardFonts.author} text-[#c9a76b]/70 font-light`}>— {poem.author}</span>
                                                        </div>
                                                        {isUnlocked && <div className={`${cardFonts.info} text-[#c9a76b] opacity-80 mt-1`}>意象探索: {poem.hotspots.length} 點</div>}
                                                    </div>
                                                    <div className="px-2">
                                                        {!isUnlocked ? <i className="fa-solid fa-lock text-gray-600 text-sm"></i> : 
                                                         isCompleted ? <i className="fa-solid fa-circle-check text-[#c9a76b] text-base"></i> :
                                                         <i className="fa-solid fa-chevron-right text-[#c9a76b] text-sm"></i>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </>
                            ) : (
                                <>
                                    <div className="mb-4">
                                        <p className="text-[#c9a76b] text-base tracking-widest">典藏卷軸</p>
                                        <p className="text-gray-400 text-[11px] tracking-wider mt-0.5">溫故知新，品味已解鎖的文學經典</p>
                                    </div>
                                    <div className="space-y-3.5 mb-10">
                                        {POEMS.filter(p => unlockedPoems.includes(p.id)).map((poem) => (
                                            <div key={poem.id} onClick={() => setReadingPoem(poem)} className="relative flex items-center justify-between p-3.5 rounded-lg border border-[#4a3f2b] bg-[#1a1712]/90 clickable-hotspot hover:bg-[#231f18] transition-all duration-300">
                                                <div>
                                                    <h4 className={`${cardFonts.title} text-[#e0d5ba] font-bold tracking-wider mb-0.5`}>{poem.title}</h4>
                                                    <p className={`${cardFonts.author} text-gray-500`}>{poem.author}</p>
                                                </div>
                                                <i className="fa-solid fa-book-open text-[#c9a76b] opacity-80"></i>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            )}
                        </div>

                        {readingPoem && (
                            <div className="absolute inset-0 z-50 bg-[#0d0c0a] flex flex-col animate-fade-in overflow-hidden">
                                <div className="flex justify-between items-center py-2 px-5 border-b border-[#2d281f] bg-[#0d0c0a]/95 backdrop-blur-md">
                                    <button onClick={() => setReadingPoem(null)} className="p-2 clickable-hotspot"><i className="fa-solid fa-chevron-left text-[#c9a76b] text-lg"></i></button>
                                    <div className="text-center"><h2 className="text-sm text-[#e0d5ba] tracking-[0.2em] font-bold">{readingPoem.title}</h2><p className="text-[10px] text-gray-500">{readingPoem.author}</p></div>
                                    <div className="w-8"></div> 
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 relative scrollbar-hide">
                                    <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{ backgroundImage: `url(${readingPoem.bgImage})`, backgroundSize: 'cover', backgroundPosition: 'center' }}></div>
                                    <div className="relative z-10 max-w-md mx-auto space-y-5 text-center mt-6">
                                        {readingPoem.fullText && readingPoem.fullText.length > 0 ? readingPoem.fullText.map((line, idx) => <p key={idx} className={`${getReadingFontClass()} text-[#e0d5ba] tracking-widest drop-shadow-md font-medium`}>{line}</p>) : <p className="text-gray-500 tracking-widest text-xs">全文編撰中...</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {showMenu && (
                            <div className="absolute inset-0 z-50 bg-[#080807] flex flex-col animate-fade-in overflow-hidden pointer-events-auto">
                                <div className="flex items-center py-2 px-5 border-b border-[#2d281f] bg-[#0d0c0a]">
                                    <button onClick={() => setShowMenu(false)} className="p-2 clickable-hotspot"><i className="fa-solid fa-chevron-left text-[#c9a76b] text-lg"></i></button>
                                    <h2 className="text-sm text-[#e0d5ba] tracking-[0.2em] font-bold ml-4">雅士成就</h2>
                                </div>
                                <div className="flex-1 p-5 overflow-y-auto scrollbar-hide">
                                    <div className="flex flex-col items-center justify-center mt-4 mb-8">
                                        <div className="w-16 h-16 rounded-full border border-[#c9a76b] flex items-center justify-center mb-3 bg-[#141210] shadow-[0_0_15px_rgba(201,167,107,0.15)]">
                                            <i className="fa-solid fa-award text-[#c9a76b] text-3xl"></i>
                                        </div>
                                        <h3 className="text-sm text-[#e0d5ba] tracking-widest font-bold">無名詩客</h3>
                                        <p className="text-[10px] text-[#c9a76b]/70 tracking-wider mt-1">底蘊值：{unlockedPoems.length * 10} 點</p>
                                    </div>
                                    
                                    <div className="pt-4 border-t border-[#2d281f] mt-6">
                                        <h4 className="text-xs text-[#c9a76b] border-l border-[#c9a76b] pl-2 tracking-widest uppercase mb-3">實體文創集章冊</h4>
                                        <p className="text-[10px] text-gray-400 mb-4 leading-relaxed">完成指定篇章探索，即可自動集得專屬古風印鑑。<br/><span className="text-[#c9a76b]/80 mt-1 inline-block">🎁 實體連動：</span>集滿指定數量，未來可於聯名書店或藝文空間兌換實體「水墨拓印紀念明信片」！</p>
                                        <div className="grid grid-cols-3 gap-3">
                                            {/* 示範印鑑：蒹葭 */}
                                            <div className={`flex flex-col items-center justify-center p-3 rounded-lg border bg-[#141210]/60 ${unlockedPoems.includes('jianjia') ? 'border-red-800/40 text-red-800' : 'border-[#1a1714] text-gray-700 opacity-30'}`}>
                                                <div className="w-10 h-10 rounded-sm border-[3px] border-double border-current flex items-center justify-center text-[15px] font-bold leading-none select-none relative overflow-hidden transform -rotate-3">
                                                    蒹
                                                </div>
                                                <span className="text-[9px] mt-1.5 font-bold">白露印</span>
                                            </div>
                                            {/* 示範印鑑：涉江 */}
                                            <div className={`flex flex-col items-center justify-center p-3 rounded-lg border bg-[#141210]/60 ${unlockedPoems.includes('shejiang') ? 'border-red-800/40 text-red-800' : 'border-[#1a1714] text-gray-700 opacity-30'}`}>
                                                <div className="w-10 h-10 rounded-sm border-[3px] border-solid border-current flex items-center justify-center text-[15px] font-bold leading-none select-none relative overflow-hidden transform rotate-6">
                                                    涉
                                                </div>
                                                <span className="text-[9px] mt-1.5 font-bold">楚辭印</span>
                                            </div>
                                            {/* 示範印鑑：齊桓 */}
                                            <div className={`flex flex-col items-center justify-center p-3 rounded-lg border bg-[#141210]/60 ${unlockedPoems.includes('qihuan') ? 'border-red-800/40 text-red-800' : 'border-[#1a1714] text-gray-700 opacity-30'}`}>
                                                <div className="w-10 h-10 rounded-full border-[2px] border-dashed border-current flex items-center justify-center text-[14px] font-bold leading-none select-none relative overflow-hidden">
                                                    齊
                                                </div>
                                                <span className="text-[9px] mt-1.5 font-bold">宣王印</span>
                                            </div>
                                        </div>
                                        <div className="mt-6 p-2.5 rounded border border-[#2d281f]/60 bg-[#161411]/50 text-center flex items-center justify-center gap-1.5">
                                            <div className="w-2 h-2 rounded-full bg-green-700/80 animate-pulse"></div>
                                            <span className="text-[9px] text-gray-400 tracking-widest font-bold">Supabase 雲端數據連線預備中</span>
                                        </div>
                                    </div>
                                    <div className="h-10"></div>
                                </div>
                            </div>
                        )}

                        {showSettings && (
                            <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center animate-fade-in pointer-events-auto">
                                <div className="bg-[#11100e] border border-[#4a3f2b] rounded-xl w-[85%] max-w-xs p-5 relative shadow-[0_0_20px_rgba(201,167,107,0.15)]">
                                    <h2 className="text-base text-[#c9a76b] tracking-[0.2em] font-bold text-center mb-5 border-b border-[#2d281f] pb-3">系統設置</h2>
                                    <div className="space-y-4 mb-6 px-1">
                                        <div className="flex justify-between items-center"><span className="text-[#e0d5ba] tracking-widest text-xs">背景音樂</span><button className={`w-10 h-5 rounded-full relative transition-colors duration-300 clickable-hotspot ${audioSettings.bgm ? 'bg-[#c9a76b]' : 'bg-gray-700'}`} onClick={() => setAudioSettings({...audioSettings, bgm: !audioSettings.bgm})}><div className={`w-3.5 h-3.5 bg-[#11100e] rounded-full absolute top-0.5 transition-transform duration-300 ${audioSettings.bgm ? 'translate-x-6' : 'translate-x-0.5'}`}></div></button></div>
                                        <div className="flex justify-between items-center"><span className="text-[#e0d5ba] tracking-widest text-xs">環境音效</span><button className={`w-10 h-5 rounded-full relative transition-colors duration-300 clickable-hotspot ${audioSettings.sfx ? 'bg-[#c9a76b]' : 'bg-gray-700'}`} onClick={() => setAudioSettings({...audioSettings, sfx: !audioSettings.sfx})}><div className={`w-3.5 h-3.5 bg-[#11100e] rounded-full absolute top-0.5 transition-transform duration-300 ${audioSettings.sfx ? 'translate-x-6' : 'translate-x-0.5'}`}></div></button></div>
                                        <div className="pt-2">
                                            <div className="flex justify-between items-center mb-1.5"><span className="text-[#e0d5ba] tracking-widest text-xs">字體大小</span><span className="text-[#c9a76b] font-bold text-[10px] uppercase">{fontSize === 'sm' ? '精緻小' : fontSize === 'lg' ? '醒目大' : '標準中'}</span></div>
                                            <div className="flex gap-2.5">{['sm', 'md', 'lg'].map(sz => <button key={sz} onClick={() => setFontSize(sz)} className={`flex-1 py-1 rounded text-[10px] tracking-widest transition-all clickable-hotspot border ${fontSize === sz ? 'bg-[#c9a76b]/20 border-[#c9a76b] text-[#c9a76b]' : 'bg-transparent border-[#2d281f] text-gray-500'}`}>{sz === 'sm' ? '小' : sz === 'md' ? '中' : '大'}</button>)}</div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-3">
                                        <button className="ink-button w-full py-2 rounded tracking-widest text-xs clickable-hotspot font-medium" onClick={() => setShowSettings(false)}>關閉</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 底部導航欄 (極致壓縮高度設計) */}
                        <div className="relative z-10 w-full bg-[#0a0a09]/95 flex flex-col pt-1 pb-1 border-t border-[#2d281f]/40">
                            <div className="flex justify-around items-center px-4 w-full h-12">
                                <InkRingButton iconClass="fa-solid fa-compass" active={homeTab === 'game' && !showMenu && !showSettings} onClick={() => { setHomeTab('game'); setShowMenu(false); setShowSettings(false); }} label="探索" />
                                <InkRingButton iconClass="fa-solid fa-scroll" active={homeTab === 'reading' && !showMenu && !showSettings} onClick={() => { setHomeTab('reading'); setShowMenu(false); setShowSettings(false); }} label="典藏" />
                                <InkRingButton iconClass="fa-solid fa-award" active={showMenu} onClick={() => { setShowMenu(true); setShowSettings(false); }} label="成就" />
                                <InkRingButton iconClass="fa-solid fa-gear" active={showSettings} onClick={() => { setShowSettings(true); setConfirmReset(false); }} label="設置" />
                            </div>
                        </div>

                        {toastMessage && <div className="absolute top-16 left-1/2 -translate-x-1/2 z-50 bg-[#161411]/95 border border-[#c9a76b]/40 py-2 px-4 rounded-md text-[11px] text-[#e0d5ba] tracking-wider shadow-xl animate-fade-in text-center max-w-[80dvw]">{toastMessage}</div>}
                    </div>
                );
            }

            if (currentPage === 'game') {
                const poem = POEMS.find(p => p.id === currentPoemId);
                return <GamePlayArea poem={poem} onBack={() => setCurrentPage('home')} onComplete={() => handlePoemComplete(poem.id)} triggerToast={triggerToast} />;
            }
            return null;
        }

        function GamePlayArea({ poem, onBack, onComplete, triggerToast }) {
            const [currentStep, setCurrentStep] = useState(0);
            const [mistakes, setMistakes] = useState({}); 
            const [isShaking, setIsShaking] = useState(false);
            const [showCompletion, setShowCompletion] = useState(false);
            const [clickedPos, setClickedPos] = useState(null); 
            const [showSubtitle, setShowSubtitle] = useState(false); 

            const handleHotspotClick = (index, e) => {
                e.stopPropagation();
                if (index === currentStep) {
                    const rect = e.currentTarget.getBoundingClientRect(); const parentRect = e.currentTarget.offsetParent.getBoundingClientRect();
                    setClickedPos({ x: rect.left + rect.width/2 - parentRect.left, y: rect.top + rect.height/2 - parentRect.top, success: true });
                    setTimeout(() => { if (currentStep + 1 >= poem.hotspots.length) setShowCompletion(true); else setCurrentStep(currentStep + 1); setClickedPos(null); }, 700);
                } else if (index > currentStep) {
                    setMistakes(prev => ({ ...prev, [currentStep]: (prev[currentStep] || 0) + 1 }));
                    setIsShaking(true); setTimeout(() => setIsShaking(false), 400);
                    const rect = e.currentTarget.getBoundingClientRect(); const parentRect = e.currentTarget.offsetParent.getBoundingClientRect();
                    setClickedPos({ x: rect.left + rect.width/2 - parentRect.left, y: rect.top + rect.height/2 - parentRect.top, success: false });
                    setTimeout(() => setClickedPos(null), 400);
                }
            };

            const handleBackgroundClick = (e) => {
                setMistakes(prev => ({ ...prev, [currentStep]: (prev[currentStep] || 0) + 1 }));
                setIsShaking(true); setTimeout(() => setIsShaking(false), 400);
                const parentRect = e.currentTarget.getBoundingClientRect();
                setClickedPos({ x: e.clientX - parentRect.left, y: e.clientY - parentRect.top, success: false });
                setTimeout(() => setClickedPos(null), 400);
            };

            return (
                <div className={`app-container bg-black overflow-hidden animate-fade-in ${isShaking ? 'animate-shake' : ''}`}>
                    <div className="absolute inset-0 w-full h-full cursor-pointer animate-fade-in pointer-events-auto" onClick={handleBackgroundClick}>
                        <img src={poem.bgImage} alt="Backdrop" className="w-full h-full object-cover opacity-65" />
                    </div>
                    
                    <div className="absolute top-0 left-0 w-full py-1.5 px-4 flex justify-between items-center pointer-events-none z-20 bg-black/35 backdrop-blur-[1px]">
                        <button onClick={onBack} className="pointer-events-auto p-1.5 clickable-hotspot"><i className="fa-solid fa-chevron-left text-[#c9a76b] text-lg"></i></button>
                        <div className="text-center drop-shadow-lg"><h2 className="text-sm text-[#e0d5ba] tracking-[0.25em] font-medium">{poem.title}</h2><p className="text-[9px] text-gray-400 font-light">— {poem.author} —</p></div>
                        <button onClick={() => { setShowSubtitle(!showSubtitle); triggerToast(showSubtitle ? "提示已隱藏" : "提示已開啟"); }} className="pointer-events-auto p-1.5 clickable-hotspot">
                            <i className={`fa-solid ${showSubtitle ? 'fa-eye text-[#c9a76b]' : 'fa-eye-slash text-gray-400'} text-sm`}></i>
                        </button>
                    </div>

                    {poem.hotspots.map((spot, index) => {
                        const isCurrentTarget = index === currentStep; const isCompleted = index < currentStep; const mistakeCount = mistakes[index] || 0;
                        const needsHint = isCurrentTarget && mistakeCount >= 2;
                        return (
                            <div key={spot.id} className={`absolute w-12 h-12 -ml-6 -mt-6 rounded-full flex items-center justify-center clickable-hotspot transition-opacity duration-500 ${isCompleted ? 'opacity-0 pointer-events-none' : 'opacity-100'}`} style={{ left: `${spot.x}%`, top: `${spot.y}%`, zIndex: 10 }} onClick={(e) => handleHotspotClick(index, e)}>
                                <div className={`w-3.5 h-3.5 rounded-full transition-all duration-500 ${needsHint ? 'border border-[#c9a76b] hint-pulse bg-[#c9a76b]/20' : 'bg-transparent'} ${isCurrentTarget && mistakeCount === 1 ? 'bg-white/10' : ''}`}></div>
                            </div>
                        );
                    })}

                    {clickedPos && <div className={`absolute rounded-full pointer-events-none z-30 ripple-effect ${clickedPos.success ? 'border-2 border-[#c9a76b] bg-[#c9a76b]/25 shadow-[0_0_12px_#c9a76b]' : 'border-2 border-red-500/40 bg-red-500/15'}`} style={{ left: clickedPos.x, top: clickedPos.y, width: '24px', height: '24px', marginLeft: '-12px', marginTop: '-12px' }} />}

                    <div className="absolute bottom-20 left-0 w-full px-4 text-center pointer-events-none z-30">
                        {currentStep < poem.hotspots.length && (
                            <div className="h-10 flex items-center justify-center pointer-events-none">
                                {showSubtitle ? <p className="text-sm text-[#e0d5ba] tracking-widest font-bold bg-black/45 backdrop-blur-[2px] py-1.5 px-4 rounded-full inline-block drop-shadow-md">{poem.hotspots[currentStep].label}</p> : <p className="text-[10px] text-gray-400/80 tracking-widest italic bg-black/45 backdrop-blur-[2px] py-1.5 px-4 rounded-full inline-block">〔 請於畫面中點選對應意象 〕</p>}
                            </div>
                        )}
                    </div>

                    {/* 遊戲內極致壓縮導航 */}
                    <div className="absolute bottom-0 left-0 w-full bg-[#0a0a09]/95 flex flex-col pt-1 pb-1 border-t border-[#2d281f]/40 z-20">
                        <div className="flex justify-around items-center px-4 w-full h-12">
                            <InkRingButton iconClass="fa-solid fa-arrow-left" active={false} onClick={onBack} label="返回" />
                            <div className="flex flex-col items-center">
                                <div className="w-10 h-10 flex items-center justify-center rounded-full border border-[#2d281f]/50 relative bg-[#131210]"><span className="text-[#c9a76b] font-bold text-[11px] tracking-widest">{currentStep} / {poem.hotspots.length}</span></div>
                                <span className="text-[9px] mt-1 tracking-wider text-gray-500">進度</span>
                            </div>
                            <InkRingButton iconClass="fa-solid fa-rotate-right" active={false} onClick={() => {setCurrentStep(0); setMistakes({}); triggerToast("重置本篇進度");}} label="重置" />
                        </div>
                    </div>

                    {showCompletion && (
                        <div className="absolute inset-0 bg-black/90 backdrop-blur-md z-50 flex flex-col items-center justify-center animate-fade-in pointer-events-auto">
                            <div className="w-16 h-16 rounded-full border-2 border-[#c9a76b] flex items-center justify-center mb-5 shadow-[0_0_15px_rgba(201,167,107,0.35)]"><i className="fa-solid fa-circle-check text-[#c9a76b] text-3xl"></i></div>
                            <h2 className="text-xl text-[#e0d5ba] tracking-widest font-bold mb-1">典藏入卷</h2>
                            <p className="text-gray-400 text-xs mb-10">已完成《{poem.title}》實機探索</p>
                            <button onClick={onComplete} className="ink-button clickable-hotspot px-12 py-3 rounded-md tracking-widest text-xs font-bold">返回卷軸</button>
                        </div>
                    )}
                </div>
            );
        }

        // 啟動 React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
