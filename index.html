<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>詩境遊 - 沉浸式學習文學</title>
    
    <!-- 引入 Tailwind CSS 進行國風排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM 核心 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 引入 Babel 用於在瀏覽器中即時編譯 JSX 語法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 FontAwesome 圖示庫 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入 Google Fonts 中文古典字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        html, body, #root {
            height: 100dvh;
            margin: 0; padding: 0;
            background-color: #0d0c0a;
            color: #e0d5ba;
            font-family: 'Noto Serif TC', serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none; 
        }
        /* 最外層容器，確保在桌面版置中與 16:9 比例 */
        .viewport-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-dark, #121212);
            overflow: hidden;
            position: relative;
        }
        .viewport-container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(35, 48, 60, 0.4), transparent 60%);
            animation: ambientBreathing 12s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes ambientBreathing {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(2%, 3%) scale(1.05); opacity: 0.6; }
        }
        .game-frame {
            height: 100vh;
            width: 100%;
            max-width: calc(100vh * (9 / 16));
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            background-color: #0d0c0a;
        }
        .app-container {
            height: 100%; width: 100%;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        img { user-drag: none; -webkit-user-drag: none; pointer-events: none; }
        button, .clickable-hotspot { pointer-events: auto; }
        
        /* 國風按鈕與特效 */
        .start-btn {
            font-size: 15px; padding: 13px 44px; border-radius: 12px;
            border: 1px solid rgba(255, 215, 120, 0.55);
            background: rgba(10, 10, 8, 0.45); color: #f5d38a;
            position: relative; overflow: hidden;
            transition: transform 0.1s ease-in-out;
            letter-spacing: 0.5em; text-indent: 0.5em; 
            box-shadow: 0 0 25px rgba(255, 215, 120, 0.1);
        }
        .start-btn.pressed { transform: scale(0.92); }
        .custom-ripple {
            position: absolute; width: 20px; height: 20px;
            background: rgba(255, 215, 120, 0.45); border-radius: 50%;
            left: 50%; top: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
            animation: custom-ripple-expand 0.6s ease-out forwards;
        }
        @keyframes custom-ripple-expand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(12); opacity: 0; }
        }
        .ink-button { background: rgba(13, 12, 10, 0.9); border: 1px solid #c9a76b; color: #e0d5ba; transition: all 0.3s ease; }
        .ink-button:active { transform: scale(0.95); }
        
        /* 動畫宣告 */
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 4s linear infinite; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(201, 167, 107, 0.3); border-color: rgba(201, 167, 107, 0.2); }
            50% { box-shadow: 0 0 18px 8px rgba(201, 167, 107, 0.7); border-color: rgba(201, 167, 107, 0.9); }
        }
        .hint-pulse { animation: pulse-glow 2s infinite; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
        .ripple-effect { animation: ripple 0.6s ease-out forwards; }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.8s ease-in-out forwards; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .fullText { user-select: text !important; -webkit-user-select: text !important; cursor: text; }
        /* 將原本要加在 game-frame 的濾鏡獨立出來 */
        .menu-filter {filter: contrast(1.05) brightness(0.9) saturate(1.1); /* 替換成你原本設定的濾鏡數值 */
    transition: filter 0.5s ease-in-out;
}
    </style>
</head>
<body>
    <div id="root"></div>
<script src="poems.js"></script>
    <div id="yt-player" style="position: absolute; left: -9999px; pointer-events: none;"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;



        // 修正預載函式 (大小寫對齊、移除了未定義的 bgImage 變數)
        window.addEventListener('DOMContentLoaded', () => {
          preloadAssets();
          preloadFonts();
        });

        function preloadAssets() {
          const imagesToPreload = [
            './Start.webp',
            './Startbtn.webp',
            './Loading.webp',
            './Loading icon.webp',
            './Game.webp'
          ];
          imagesToPreload.forEach(src => {
            const img = new Image();
            img.src = src;
          });
        }

        function preloadFonts() {
          if ('fonts' in document) {
            document.fonts.load('16px "Noto Serif TC"').then(() => {
              console.log('字體已在後台下載完畢');
            });
          }
        }

        let ytPlayer;
        function onYouTubeIframeAPIReady() {
          ytPlayer = new YT.Player('yt-player', {
            height: '0', width: '0', videoId: '11pvOw2DZ58',
            playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': '11pvOw2DZ58' },
      events: {
      'onReady': (event) => {
        event.target.playVideo();
        event.target.setVolume(100); // 預設滿音量
      }
    }
          });
        }

        class SoundManager {
          constructor() {
            this.sfx = {
              stamp: new Audio('assets/audio/stamp.mp3'),
              pageTurn: new Audio('assets/audio/paper-turn.mp3'),
              click: new Audio('assets/audio/jade-click.mp3')
            };
            this.ambientWind = new Audio('assets/audio/ambient-wind.mp3');
            this.ambientWind.loop = true;
            this.ambientWind.volume = 0.7;

// 用來存放目前篇章的專屬環境音
            this.currentAmbience = null;
          }
          playSFX(name, volume = 1) {
            if (this.sfx[name]) {
              const soundClone = this.sfx[name].cloneNode();
              soundClone.volume = volume;
              soundClone.play().catch(e => console.log('音效播放受限:', e));
            }
          }
          startAmbient() {
            this.ambientWind.play().catch(e => console.log('環境音播放受限:', e));
          }
// 【核心新增】進入遊戲篇章：YouTube 降音量至 20，並播放篇章音效 (音量 0.9)
  enterGameMode(audioSrc) {
    // 1. YouTube 降音 (YT API 的 setVolume 範圍是 0 ~ 100，所以 0.2 對應 20)
    if (typeof ytPlayer !== 'undefined' && ytPlayer && ytPlayer.setVolume) {
      ytPlayer.setVolume(20);
    }

    // 2. 播放篇章環境音 (音量設為 0.9，符合你要求的 0.8 - 1)
    if (audioSrc) {
      if (this.currentAmbience) {
        this.currentAmbience.pause();
      }
      this.currentAmbience = new Audio(audioSrc);
      this.currentAmbience.loop = true;
      this.currentAmbience.volume = 0.9; 
      this.currentAmbience.play().catch(e => console.log('篇章音效播放受限:', e));
    }
  }

  // 【核心新增】返回主畫面：YouTube 回復 100 音量，停止篇章環境音
  exitGameMode() {
    if (typeof ytPlayer !== 'undefined' && ytPlayer && ytPlayer.setVolume) {
      ytPlayer.setVolume(100);
    }

    if (this.currentAmbience) {
      this.currentAmbience.pause();
      this.currentAmbience = null;
    }
  }
}

const SM = new SoundManager();
        
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });
            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {}
            };
            return [storedValue, setValue];
        }

        function StartButton({ onClick }) {
            const [ripples, setRipples] = useState([]);
            const [isPressed, setIsPressed] = useState(false);

            const handleClick = (e) => {
                setIsPressed(true);
                setTimeout(() => setIsPressed(false), 100); 
                const newRipple = { id: Date.now() };
                setRipples(prev => [...prev, newRipple]);
                setTimeout(() => setRipples(prev => prev.filter(r => r.id !== newRipple.id)), 600);
                setTimeout(onClick, 150);
            };

            return (
                <button className={`start-btn clickable-hotspot ${isPressed ? 'pressed' : ''}`} onClick={handleClick}>
                    開始
                    {ripples.map(r => <span key={r.id} className="custom-ripple" />)}
                </button>
            );
        }

        function InkRingButton({ iconClass, onClick, active, label }) {
            return (
                <div className="flex flex-col items-center">
                    <button onClick={onClick} className={`relative w-10 h-10 flex items-center justify-center rounded-full transition-all duration-300 active:scale-90 cursor-pointer select-none clickable-hotspot ${active ? 'text-[#c9a76b] scale-105' : 'text-gray-500 hover:text-gray-400'}`}>
                        <svg viewBox="0 0 100 100" className={`absolute inset-0 w-full h-full pointer-events-none opacity-85 transition-transform duration-500 ${active ? 'rotate-[45deg]' : 'rotate-0'}`}>
                            <path d="M 50,8 A 42,42 0 1,1 49.9,8 Z" stroke="currentColor" strokeWidth="4" fill="none" strokeLinecap="round" strokeDasharray="160 40 100 60" />
                            <path d="M 50,13 A 37,37 0 1,0 50.1,13 Z" stroke="currentColor" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeDasharray="30 20 80 40" className="opacity-40" />
                        </svg>
                        <div className="z-10 flex items-center justify-center filter drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
                            <i className={`${iconClass} ${active ? 'opacity-100' : 'opacity-80'}`}></i>
                        </div>
                    </button>
                    <span className={`text-[9px] mt-1 tracking-wider transition-colors duration-300 font-medium ${active ? 'text-[#c9a76b]' : 'text-gray-500'}`}>{label}</span>
                </div>
            );
        }

        const preloadImage = (src) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = src;
                img.onload = () => resolve({ status: 'success', src });
                img.onerror = () => {
                    console.warn(`圖片載入失敗，略過等待: ${src}`);
                    resolve({ status: 'error', src }); 
                };
            });
        };

        const checkFontsReady = () => {
            if ('fonts' in document) return document.fonts.ready;
            return Promise.resolve();
        };

        function App() {
            const [currentPage, setCurrentPage] = useState('start'); 
            const [unlockedPoems, setUnlockedPoems] = useLocalStorage('shijing_unlocked_poems_v4', ['jianjia', 'shejiang', 'qihuan']);
            const [currentPoemId, setCurrentPoemId] = useState(null);
            const [homeTab, setHomeTab] = useState('game'); 
            const [readingPoem, setReadingPoem] = useState(null); 
            const [showMenu, setShowMenu] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [audioSettings, setAudioSettings] = useLocalStorage('shijing_audio_settings', { bgm: true, sfx: true });
            const [confirmReset, setConfirmReset] = useState(false); 
            const [toastMessage, setToastMessage] = useState('');
            const [fontSize, setFontSize] = useLocalStorage('shijing_font_size', 'md');

            const touchStartX = useRef(0);
            const touchEndX = useRef(0);

            const triggerToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 3000);
            };

            const startGame = () => {
                if (window.ytPlayer && window.ytPlayer.playVideo) window.ytPlayer.playVideo();
                SM.startAmbient();
                SM.playSFX('click', 0.8);
                setCurrentPage('loading'); 
            };

            // 修正：將變數大寫改為 POEMS，並正確關閉 useEffect 區塊
            useEffect(() => {
                if (currentPage === 'loading') {
                    const loadAllAssets = async () => {
                        const poemImages = POEMS
                            .filter(p => p.bgImage && p.bgImage.trim() !== "")
                            .map(p => p.bgImage);

                        console.log("開始驗證與下載遊戲資源...");
                        const minTimePromise = new Promise(resolve => setTimeout(resolve, 1500));
                        
                        const imagesToLoad = [
                            './Game.webp',
                            './Loading.webp', 
                            './Loading icon.webp',
                            ...poemImages 
                        ];

                        const imagePromise = Promise.all(imagesToLoad.map(src => preloadImage(src)));
                        const fontPromise = checkFontsReady();
                        const storagePromise = new Promise((resolve) => {
                            try {
                                const testKey = '__shijing_test__';
                                window.localStorage.setItem(testKey, 'ok');
                                window.localStorage.removeItem(testKey);
                            } catch (e) { console.warn("LocalStorage 目前處於受限模式：", e); }
                            resolve();
                        });

                        await Promise.all([imagePromise, fontPromise, storagePromise, minTimePromise]);
                        console.log("所有資源準備就緒，進入遊戲主畫面！");
                        setCurrentPage('home');
                    };
                    loadAllAssets();
                }
            }, [currentPage]);

            const openPoem = (id) => {
                if (unlockedPoems.includes(id)) {
                    setCurrentPoemId(id);
                    setCurrentPage('game');
                    const poemObj = POEMS.find(p => p.id === id);
                    if (poemObj) {
            // 在這裡呼叫！會自動把 YouTube 壓低到 20%，並播放該篇章的 ambienceAudio
            SM.enterGameMode(poemObj.ambienceAudio);

            const ambienceName = poemObj.ambience || "意境音效";
            setTimeout(() => triggerToast(`🎧 正在播放背景音效：${ambienceName}`), 1000);
        }
                } else {
                    triggerToast("此篇尚未解鎖，請先完成前置章節。");
                }
            };

            const handlePoemComplete = (id) => {
                const currentIndex = POEMS.findIndex(p => p.id === id);
                if (currentIndex >= 0 && currentIndex < POEMS.length - 1) {
                    const nextId = POEMS[currentIndex + 1].id;
                    if (!unlockedPoems.includes(nextId)) {
                        setUnlockedPoems([...unlockedPoems, nextId]);
                        setTimeout(() => triggerToast(`✨ 恭喜解鎖新篇章：《${POEMS[currentIndex + 1].title}》！`), 800);
                    }
                }
                setCurrentPage('home');
            };

            const handleTouchStart = (e) => { touchStartX.current = e.targetTouches[0].clientX; };
            const handleTouchMove = (e) => { touchEndX.current = e.targetTouches[0].clientX; };
            const handleTouchEnd = () => {
                const diff = touchStartX.current - touchEndX.current;
                if (Math.abs(diff) > 80) { 
                    if (diff > 0 && homeTab === 'game') { setHomeTab('reading'); triggerToast("切換至：閱讀模式"); } 
                    else if (diff < 0 && homeTab === 'reading') { setHomeTab('game'); triggerToast("切換至：探索模式"); }
                }
            };

            const getCardFontClasses = () => {
                if (fontSize === 'sm') return { title: 'text-xs', author: 'text-[9px]', info: 'text-[8px]' };
                if (fontSize === 'lg') return { title: 'text-base', author: 'text-xs', info: 'text-xs' };
                return { title: 'text-sm', author: 'text-[10px]', info: 'text-[9px]' };
            };

            const getReadingFontClass = () => {
                if (fontSize === 'sm') return 'text-sm leading-relaxed';
                if (fontSize === 'lg') return 'text-lg md:text-xl leading-loose';
                return 'text-base leading-relaxed'; 
            };

            // --- 頁面路由控制 (修正原本白屏的 Render 邏輯) ---
            if (currentPage === 'start') {
                return (
                    <div className="app-container bg-contain bg-no-repeat bg-center flex flex-col items-center justify-center animate-fade-in relative select-none" style={{ backgroundImage: "url('./Start.webp')" }}>
                        {/* 將原本沒用到的 StartButton 完美整合進來，或保留你的圖片按鈕 */}
                        <div className="absolute bottom-[25%] z-20">
                            <StartButton onClick={startGame} />
                        </div>
                        {/* 你的圖片開始按鈕備份：
                        <button onClick={startGame} className="absolute bottom-[25%] w-[35%] h-[8%] bg-contain bg-no-repeat bg-center hover:scale-105 active:scale-95 transition-transform z-20" style={{ backgroundImage: "url('./Startbtn.webp')" }} />
                        */}
                    </div>
                );
            }

            if (currentPage === 'loading') {
                return (
                    <div className="app-container bg-contain bg-no-repeat bg-center flex flex-col items-center justify-center relative animate-fade-in" style={{ backgroundImage: "url('./Loading.webp')" }}>
                        <div className="absolute top-1/4 flex flex-col items-center z-10">
                            <div className="relative w-28 h-28 flex items-center justify-center mt-20">
                                <img src="./Loading icon.webp" alt="載入中" className="w-full h-full object-contain animate-spin-slow pointer-events-none opacity-85" style={{ filter: 'drop-shadow(0 0 8px rgba(0,0,0,0.3))' }} />
                            </div>
                        </div>
                    </div>
                );
            }

            if (currentPage === 'home') {
                const cardFonts = getCardFontClasses();
                return (
                    <div className="app-container bg-contain bg-no-repeat bg-center flex flex-col justify-between animate-fade-in" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
                        <div className="absolute inset-0 opacity-15 pointer-events-none" style={{ backgroundImage: "url('./Game.webp')", backgroundSize: 'cover', mixBlendMode: 'overlay' }}></div>
                        
                        <header className="flex justify-between items-center py-2 px-5 border-b border-[#2d281f] relative z-10 bg-[#0d0c0a]/90 backdrop-blur-md">
                            <h1 className="text-base text-[#c9a76b] tracking-[0.4em] font-medium py-1">文學遊<span className="text-[10px] text-red-800 ml-1 font-bold">林</span></h1>
                            <div className="text-[10px] text-gray-500 tracking-widest uppercase">{homeTab === 'game' ? '探索篇章' : '典藏閱讀'}</div>
                        </header>

                        <div className="flex-1 overflow-y-auto px-6 py-4 relative z-10 scrollbar-hide">
                            {homeTab === 'game' ? (
                                <>
                                    <div className="mb-4">
                                        <p className="text-[#c9a76b] text-base tracking-widest">探索詩境之美</p>
                                        <p className="text-gray-400 text-[11px] tracking-wider mt-0.5">走進詩人的世界，感受文字背後的意境</p>
                                    </div>
                                    <h3 className="text-xs text-gray-500 mb-3 border-l-2 border-[#c9a76b] pl-2 tracking-widest uppercase">DSE 28篇指定篇章</h3>
                                    <div className="space-y-3.5 mb-10">
                                        {POEMS.map((poem, idx) => {
                                            const isUnlocked = unlockedPoems.includes(poem.id);
                                            const isCompleted = isUnlocked && poem.hotspots.length > 0;
                                            return (
                                                <div key={poem.id} onClick={() => openPoem(poem.id)} className={`relative flex items-center p-2.5 rounded-lg border clickable-hotspot transition-all duration-300 ${isUnlocked ? 'border-[#4a3f2b] bg-[#1a1712]/90 hover:bg-[#231e16] shadow-sm' : 'border-[#1a1714] bg-[#0c0a09] opacity-45'}`}>
                                                    <div className="w-14 h-14 rounded-md bg-gray-900 overflow-hidden mr-3 shrink-0 relative border border-[#3a3224]/50 flex items-center justify-center text-xs text-gray-600 font-bold">
                                                        {isUnlocked ? <img src={poem.bgImage} alt={poem.title} className="w-full h-full object-cover opacity-50" /> : idx + 1}
                                                    </div>
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-2">
                                                            <h4 className={`${cardFonts.title} text-[#e0d5ba] tracking-wider font-bold`}>{poem.title}</h4>
                                                            <span className={`${cardFonts.author} text-[#c9a76b]/70 font-light`}>— {poem.author}</span>
                                                        </div>
                                                        {isUnlocked && <div className={`${cardFonts.info} text-[#c9a76b] opacity-80 mt-1`}>意象探索: {poem.hotspots.length} 點</div>}
                                                    </div>
                                                    <div className="px-2">
                                                        {!isUnlocked ? <i className="fa-solid fa-lock text-gray-600 text-sm"></i> : 
                                                         isCompleted ? <i className="fa-solid fa-circle-check text-[#c9a76b] text-base"></i> :
                                                         <i className="fa-solid fa-chevron-right text-[#c9a76b] text-sm"></i>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </>
                            ) : (
                                <>
                                    <div className="mb-4">
                                        <p className="text-[#c9a76b] text-base tracking-widest">典藏卷軸</p>
                                        <p className="text-gray-400 text-[11px] tracking-wider mt-0.5">溫故知新，品味已解鎖的文學經典</p>
                                    </div>
                                    <div className="space-y-3.5 mb-10">
                                        {POEMS.filter(p => unlockedPoems.includes(p.id)).map((poem) => (
                                            <div key={poem.id} onClick={() => setReadingPoem(poem)} className="relative flex items-center justify-between p-3.5 rounded-lg border border-[#4a3f2b] bg-[#1a1712]/90 clickable-hotspot hover:bg-[#231f18] transition-all duration-300">
                                                <div>
                                                    <h4 className={`${cardFonts.title} text-[#e0d5ba] font-bold tracking-wider mb-0.5`}>{poem.title}</h4>
                                                    <p className={`${cardFonts.author} text-gray-500`}>{poem.author}</p>
                                                </div>
                                                <i className="fa-solid fa-book-open text-[#c9a76b] opacity-80"></i>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            )}
                        </div>

                        {readingPoem && (
                            <div className="absolute inset-0 z-50 bg-[#0d0c0a] flex flex-col animate-fade-in overflow-hidden">
                                <div className="flex justify-between items-center py-2 px-5 border-b border-[#2d281f] bg-[#0d0c0a]/95 backdrop-blur-md">
                                    <button onClick={() => setReadingPoem(null)} className="p-2 clickable-hotspot"><i className="fa-solid fa-chevron-left text-[#c9a76b] text-lg"></i></button>
                                    <div className="text-center"><h2 className="text-sm text-[#e0d5ba] tracking-[0.2em] font-bold">{readingPoem.title}</h2><p className="text-[10px] text-gray-500">{readingPoem.author}</p></div>
                                    <div className="w-8"></div> 
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 relative scrollbar-hide">
                                    <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{ backgroundImage: `url(${readingPoem.bgImage})`, backgroundSize: 'cover', backgroundPosition: 'center' }}></div>
                                    <div className="relative z-10 max-w-md mx-auto space-y-5 text-center mt-6">
                                        {readingPoem.fullText && readingPoem.fullText.length > 0 ? readingPoem.fullText.map((line, idx) => <p key={idx} className={`${getReadingFontClass()} text-[#e0d5ba] tracking-widest drop-shadow-md font-medium`}>{line}</p>) : <p className="text-gray-500 tracking-widest text-xs">全文編撰中...</p>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {showMenu && (
                            <div className="absolute inset-0 z-50 bg-[#080807] flex flex-col animate-fade-in overflow-hidden pointer-events-auto">
                                <div className="flex items-center py-2 px-5 border-b border-[#2d281f] bg-[#0d0c0a]">
                                    <button onClick={() => setShowMenu(false)} className="p-2 clickable-hotspot"><i className="fa-solid fa-chevron-left text-[#c9a76b] text-lg"></i></button>
                                    <h2 className="text-sm text-[#e0d5ba] tracking-[0.2em] font-bold ml-4">雅士成就</h2>
                                </div>
                                <div className="flex-1 p-5 overflow-y-auto scrollbar-hide">
                                    <div className="flex flex-col items-center justify-center mt-4 mb-8">
                                        <div className="w-16 h-16 rounded-full border border-[#c9a76b] flex items-center justify-center mb-3 bg-[#141210] shadow-[0_0_15px_rgba(201,167,107,0.15)]"><i className="fa-solid fa-award text-[#c9a76b] text-3xl"></i></div>
                                        <h3 className="text-sm text-[#e0d5ba] tracking-widest font-bold">無名詩客</h3>
                                        <p className="text-[10px] text-[#c9a76b]/70 tracking-wider mt-1">底蘊值：{unlockedPoems.length * 10} 點</p>
                                    </div>
                                    
                                    <div className="pt-4 border-t border-[#2d281f] mt-6">
                                        <h4 className="text-xs text-[#c9a76b] border-l border-[#c9a76b] pl-2 tracking-widest uppercase mb-3">文創集章冊</h4>
                                        <p className="text-[10px] text-gray-400 mb-4 leading-relaxed">完成指定篇章探索，即可自動集得專屬古風印鑑。<br/><span className="text-[#c9a76b]/80 mt-1 inline-block">🎁 歡迎聯動：</span>集滿指定數量，未來可於聯名書店或藝文空間兌換「水墨拓印紀念明信片」！</p>

                                        <div className="grid grid-cols-3 gap-3">
                                            <div className={`flex flex-col items-center justify-center p-3 rounded-lg border bg-[#141210]/60 ${unlockedPoems.includes('jianjia') ? 'border-red-800/40 text-red-800' : 'border-[#1a1714] text-gray-700 opacity-30'}`}><div className="w-10 h-10 rounded-sm border-[3px] border-double border-current flex items-center justify-center text-[15px] font-bold -rotate-3">蒹</div><span className="text-[9px] mt-1.5 font-bold">白露印</span></div>
                                            <div className={`flex flex-col items-center justify-center p-3 rounded-lg border bg-[#141210]/60 ${unlockedPoems.includes('shejiang') ? 'border-red-800/40 text-red-800' : 'border-[#1a1714] text-gray-700 opacity-30'}`}><div className="w-10 h-10 rounded-sm border-[3px] border-solid border-current flex items-center justify-center text-[15px] font-bold rotate-6">涉</div><span className="text-[9px] mt-1.5 font-bold">楚辭印</span></div>
                                            <div className={`flex flex-col items-center justify-center p-3 rounded-lg border bg-[#141210]/60 ${unlockedPoems.includes('qihuan') ? 'border-red-800/40 text-red-800' : 'border-[#1a1714] text-gray-700 opacity-30'}`}><div className="w-10 h-10 rounded-full border-[2px] border-dashed border-current flex items-center justify-center text-[14px] font-bold">齊</div><span className="text-[9px] mt-1.5 font-bold">宣王印</span></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showSettings && (
                            <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center animate-fade-in pointer-events-auto">
                                <div className="bg-[#11100e] border border-[#4a3f2b] rounded-xl w-[85%] max-w-xs p-5 relative shadow-[0_0_20px_rgba(201,167,107,0.15)]">
                                    <h2 className="text-base text-[#c9a76b] tracking-[0.2em] font-bold text-center mb-5 border-b border-[#2d281f] pb-3">系統設置</h2>
                                    <div className="space-y-4 mb-6 px-1">
                                        <div className="flex justify-between items-center"><span className="text-[#e0d5ba] tracking-widest text-xs">背景音樂</span><button className={`w-10 h-5 rounded-full relative transition-colors duration-300 clickable-hotspot ${audioSettings.bgm ? 'bg-[#c9a76b]' : 'bg-gray-700'}`} onClick={() => setAudioSettings({...audioSettings, bgm: !audioSettings.bgm})}><div className={`w-3.5 h-3.5 bg-[#11100e] rounded-full absolute top-0.5 transition-transform duration-300 ${audioSettings.bgm ? 'translate-x-6' : 'translate-x-0.5'}`}></div></button></div>
                                        <div className="flex justify-between items-center"><span className="text-[#e0d5ba] tracking-widest text-xs">環境音效</span><button className={`w-10 h-5 rounded-full relative transition-colors duration-300 clickable-hotspot ${audioSettings.sfx ? 'bg-[#c9a76b]' : 'bg-gray-700'}`} onClick={() => setAudioSettings({...audioSettings, sfx: !audioSettings.sfx})}><div className={`w-3.5 h-3.5 bg-[#11100e] rounded-full absolute top-0.5 transition-transform duration-300 ${audioSettings.sfx ? 'translate-x-6' : 'translate-x-0.5'}`}></div></button></div>
                                    </div>
                                        <div className="pt-2">
                                            <div className="flex justify-between items-center mb-1.5"><span className="text-[#e0d5ba] tracking-widest text-xs">字體大小</span><span className="text-[#c9a76b] font-bold text-[10px] uppercase">{fontSize === 'sm' ? '精緻小' : fontSize === 'lg' ? '醒目大' : '標準中'}</span></div>
                                            <div className="flex gap-2.5">{['sm', 'md', 'lg'].map(sz => <button key={sz} onClick={() => setFontSize(sz)} className={`flex-1 py-1 rounded text-[10px] tracking-widest transition-all clickable-hotspot border ${fontSize === sz ? 'bg-[#c9a76b]/20 border-[#c9a76b] text-[#c9a76b]' : 'bg-transparent border-[#2d281f] text-gray-500'}`}>{sz === 'sm' ? '小' : sz === 'md' ? '中' : '大'}</button>)}</div>
                                        </div>

                                    <div className="flex flex-col gap-3 mt-4 border-t border-[#2d281f] pt-4">
                                        {!confirmReset ? (
                                            <button className="w-full py-1.5 rounded text-xs text-red-400 border border-red-900/50 hover:bg-red-950/30 tracking-widest" onClick={() => setConfirmReset(true)}>重置遊戲進度</button>
                                        ) : (
                                            <div className="flex gap-2">
                                                <button className="flex-1 py-1 rounded text-[10px] bg-red-800 text-white font-bold" onClick={() => { setUnlockedPoems(['jianjia', 'shejiang', 'qihuan']); setConfirmReset(false); setShowSettings(false); triggerToast("🔄 已重置"); }}>確定重置</button>
                                                <button className="flex-1 py-1 rounded text-[10px] bg-gray-800 text-gray-300" onClick={() => setConfirmReset(false)}>取消</button>
                                            </div>
                                        )}
                                        <button className="ink-button w-full py-2 rounded tracking-widest text-xs clickable-hotspot font-medium" onClick={() => setShowSettings(false)}>關閉</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="relative z-10 w-full bg-[#0a0a09]/95 flex flex-col pt-4 pb-4 border-t border-[#2d281f]/40">
                            <div className="flex justify-around items-center px-4 w-full h-12">
                                <InkRingButton iconClass="fa-solid fa-compass" active={homeTab === 'game' && !showMenu && !showSettings} onClick={() => { setHomeTab('game'); setShowMenu(false); setShowSettings(false); }} label="探索" />
                                <InkRingButton iconClass="fa-solid fa-scroll" active={homeTab === 'reading' && !showMenu && !showSettings} onClick={() => { setHomeTab('reading'); setShowMenu(false); setShowSettings(false); }} label="典藏" />
                                <InkRingButton iconClass="fa-solid fa-award" active={showMenu} onClick={() => { setShowMenu(true); setShowSettings(false); }} label="成就" />
                                <InkRingButton iconClass="fa-solid fa-gear" active={showSettings} onClick={() => { setShowSettings(true); setConfirmReset(false); }} label="設置" />
                            </div>
                        </div>

                        {toastMessage && <div className="absolute top-16 left-1/2 -translate-x-1/2 z-50 bg-[#161411]/95 border border-[#c9a76b]/40 py-2 px-4 rounded-md text-[11px] text-[#e0d5ba] tracking-wider shadow-xl animate-fade-in text-center max-w-[80dvw]">{toastMessage}</div>}
                    </div>
                );
            }

            if (currentPage === 'game') {
                const poem = POEMS.find(p => p.id === currentPoemId);
                return <GamePlayArea poem={poem} onBack={() =>{ 
                  // 在這裡呼叫！會自動把 YouTube 恢復為 100 音量，並關閉篇章音效
                  SM.exitGameMode(); 
                  setCurrentPage('home'); 
              }} onComplete={() => handlePoemComplete(poem.id)} triggerToast={triggerToast} />;
            }
            return null;
        }

        function GamePlayArea({ poem, onBack, onComplete, triggerToast }) {
            const [currentStep, setCurrentStep] = useState(0);
            const [mistakes, setMistakes] = useState({}); 
            const [isShaking, setIsShaking] = useState(false);
            const [showCompletion, setShowCompletion] = useState(false);
            const [clickedPos, setClickedPos] = useState(null); 
            const [showSubtitle, setShowSubtitle] = useState(false); 

            const handleHotspotClick = (index, e) => {
                e.stopPropagation();
                if (index === currentStep) {
                    const rect = e.currentTarget.getBoundingClientRect(); const parentRect = e.currentTarget.offsetParent.getBoundingClientRect();
                    setClickedPos({ x: rect.left + rect.width/2 - parentRect.left, y: rect.top + rect.height/2 - parentRect.top, success: true });
                    setTimeout(() => { if (currentStep + 1 >= poem.hotspots.length) setShowCompletion(true); else setCurrentStep(currentStep + 1); setClickedPos(null); }, 700);
                } else if (index > currentStep) {
                    setMistakes(prev => ({ ...prev, [currentStep]: (prev[currentStep] || 0) + 1 }));
                    setIsShaking(true); setTimeout(() => setIsShaking(false), 400);
                    const rect = e.currentTarget.getBoundingClientRect(); const parentRect = e.currentTarget.offsetParent.getBoundingClientRect();
                    setClickedPos({ x: rect.left + rect.width/2 - parentRect.left, y: rect.top + rect.height/2 - parentRect.top, success: false });
                    setTimeout(() => setClickedPos(null), 400);
                }
            };

            const handleBackgroundClick = (e) => {
                setMistakes(prev => ({ ...prev, [currentStep]: (prev[currentStep] || 0) + 1 }));
                setIsShaking(true); setTimeout(() => setIsShaking(false), 400);
                const parentRect = e.currentTarget.getBoundingClientRect();
                setClickedPos({ x: e.clientX - parentRect.left, y: e.clientY - parentRect.top, success: false });
                setTimeout(() => setClickedPos(null), 400);
            };

            return (
                <div className={`app-container bg-black overflow-hidden animate-fade-in ${isShaking ? 'animate-shake' : ''}`}>
                    <div className="absolute inset-0 w-full h-full cursor-pointer animate-fade-in pointer-events-auto" onClick={handleBackgroundClick}>
                        <img src={poem.bgImage} alt="Backdrop" className="w-full h-full object-cover opacity-65" />
                    </div>
                    
                    <div className="absolute top-0 left-0 w-full py-1.5 px-4 flex justify-between items-center pointer-events-none z-20 bg-black/35 backdrop-blur-[1px]">
                        <button onClick={onBack} className="pointer-events-auto p-1.5 clickable-hotspot"><i className="fa-solid fa-chevron-left text-[#c9a76b] text-lg"></i></button>
                        <div className="text-center drop-shadow-lg"><h2 className="text-sm text-[#e0d5ba] tracking-[0.25em] font-medium">{poem.title}</h2><p className="text-[9px] text-gray-400 font-light">— {poem.author} —</p></div>
                        <button onClick={() => { setShowSubtitle(!showSubtitle); triggerToast(showSubtitle ? "提示已隱藏" : "提示已開啟"); }} className="pointer-events-auto p-1.5 clickable-hotspot">
                            <i className={`fa-solid ${showSubtitle ? 'fa-eye text-[#c9a76b]' : 'fa-eye-slash text-gray-400'} text-sm`}></i>
                        </button>
                    </div>

                    {poem.hotspots.map((spot, index) => {
                        const isCurrentTarget = index === currentStep; const isCompleted = index < currentStep; const mistakeCount = mistakes[index] || 0;
                        const needsHint = isCurrentTarget && mistakeCount >= 2;
                        return (
                            <div key={spot.id} className={`absolute w-12 h-12 -ml-6 -mt-6 rounded-full flex items-center justify-center clickable-hotspot transition-opacity duration-500 ${isCompleted ? 'opacity-0 pointer-events-none' : 'opacity-100'}`} style={{ left: `${spot.x}%`, top: `${spot.y}%`, zIndex: 10 }} onClick={(e) => handleHotspotClick(index, e)}>
                                <div className={`w-3.5 h-3.5 rounded-full transition-all duration-500 ${needsHint ? 'border border-[#c9a76b] hint-pulse bg-[#c9a76b]/20' : 'bg-transparent'} ${isCurrentTarget && mistakeCount === 1 ? 'bg-white/10' : ''}`}></div>
                            </div>
                        );
                    })}

                    {clickedPos && <div className={`absolute rounded-full pointer-events-none z-30 ripple-effect ${clickedPos.success ? 'border-2 border-[#c9a76b] bg-[#c9a76b]/25 shadow-[0_0_12px_#c9a76b]' : 'border-2 border-red-500/40 bg-red-500/15'}`} style={{ left: clickedPos.x, top: clickedPos.y, width: '24px', height: '24px', marginLeft: '-12px', marginTop: '-12px' }} />}

                    <div className="absolute bottom-20 left-0 w-full px-4 text-center pointer-events-none z-30">
                        {currentStep < poem.hotspots.length && (
                            <div className="h-10 flex items-center justify-center pointer-events-none">
                                {showSubtitle ? <p className="text-sm text-[#e0d5ba] tracking-widest font-bold bg-black/45 backdrop-blur-[2px] py-1.5 px-4 rounded-full inline-block drop-shadow-md">{poem.hotspots[currentStep].label}</p> : <p className="text-[10px] text-gray-400/80 tracking-widest italic bg-black/45 backdrop-blur-[2px] py-1.5 px-4 rounded-full inline-block">〔 請於畫面中點選對應意象 〕</p>}
                            </div>
                        )}
                    </div>

                    <div className="absolute bottom-0 left-0 w-full bg-[#0a0a09]/95 flex flex-col pt-1 pb-1 border-t border-[#2d281f]/40 z-20">
                        <div className="flex justify-around items-center px-4 w-full h-12">
                            <InkRingButton iconClass="fa-solid fa-arrow-left" active={false} onClick={onBack} label="返回" />
                            <div className="flex flex-col items-center">
                                <div className="w-10 h-10 flex items-center justify-center rounded-full border border-[#2d281f]/50 relative bg-[#131210]"><span className="text-[#c9a76b] font-bold text-[11px] tracking-widest">{currentStep} / {poem.hotspots.length}</span></div>
                                <span className="text-[9px] mt-1 tracking-wider text-gray-500">進度</span>
                            </div>
                            <InkRingButton iconClass="fa-solid fa-rotate-right" active={false} onClick={() => {setCurrentStep(0); setMistakes({}); triggerToast("重置本篇進度");}} label="重置" />
                        </div>
                    </div>

                    {showCompletion && (
                        <div className="absolute inset-0 bg-black/90 backdrop-blur-md z-50 flex flex-col items-center justify-center animate-fade-in pointer-events-auto">
                            <div className="w-16 h-16 rounded-full border-2 border-[#c9a76b] flex items-center justify-center mb-5 shadow-[0_0_15px_rgba(201,167,107,0.35)]"><i className="fa-solid fa-circle-check text-[#c9a76b] text-3xl"></i></div>
                            <h2 className="text-xl text-[#e0d5ba] tracking-widest font-bold mb-1">典藏入卷</h2>
                            <p className="text-gray-400 text-xs mb-10">已完成《{poem.title}》實機探索</p>
                            <button onClick={onComplete} className="ink-button clickable-hotspot px-12 py-3 rounded-md tracking-widest text-xs font-bold">返回卷軸</button>
                        </div>
                    )}
                </div>
            );
        }

        // 啟動 React (並套用 viewport-container 讓桌面版能自動維持 16:9 比例)
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <div className="viewport-container">
                <div className="game-frame">
                    <App />
                </div>
            </div>
        );
    </script>
</body>
</html>
